<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Phlebotomy Collection - {{ package.name if package else 'TRT & Longevity Panel' }}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex items-center justify-center">

    <div class="max-w-2xl w-full bg-slate-800/80 border border-slate-700/60 rounded-2xl shadow-2xl p-6 sm:p-10 backdrop-blur-sm">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight sm:text-4xl">
                Schedule Home Sample Collection
            </h1>
            <p class="mt-2 text-slate-400 text-sm sm:text-base">
                Enter your details to confirm phlebotomist availability and book your slot.
            </p>
        </div>

        <!-- Selected Package Summary Card -->
        {% if package %}
        <div class="mb-6 p-4 rounded-xl bg-slate-900/60 border border-slate-700/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
            <div>
                <span class="text-xs font-semibold text-blue-400 uppercase tracking-wider">Selected Package</span>
                <h2 class="text-lg font-bold text-white">{{ package.name }}</h2>
            </div>
            <div class="text-right">
                <span class="text-xl font-black text-emerald-400">₹{{ "%.2f"|format(package.price) }}</span>
            </div>
        </div>
        {% endif %}

        <!-- Booking Form -->
        <form id="booking-form" class="space-y-6">
            
            <!-- Pincode Verification -->
            <div>
                <label for="pincode" class="block text-sm font-medium text-slate-300 mb-1">Pincode</label>
                <div class="flex gap-3">
                    <input type="text" id="pincode" name="pincode" placeholder="e.g. 500081" maxlength="6" required
                        class="flex-1 rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent font-mono">
                    <button type="button" onclick="verifyPincode()"
                        class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        Verify
                    </button>
                </div>
                <div id="pincode-msg" class="text-sm mt-2 hidden"></div>
            </div>

            <!-- Dynamic Diagnostic Lab Selection Dropdown -->
            <div id="lab-wrapper" class="hidden">
                <label for="lab_id" class="block text-sm font-medium text-slate-300 mb-1">Select Diagnostic Lab Partner</label>
                <select id="lab_id" name="lab_id"
                    class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </select>
            </div>

            <!-- Full Name & Phone Number -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="full_name" class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Ravi"
                        class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-slate-300 mb-1">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="9989078906"
                        class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
            </div>

            <!-- Full Address -->
            <div>
                <label for="address" class="block text-sm font-medium text-slate-300 mb-1">Full Address</label>
                <textarea id="address" name="address" rows="3" required placeholder="Flat / House No., Street, Landmark..."
                    class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">Flat 1</textarea>
            </div>

            <!-- Preferred Date & Time Slot -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="collection_date" class="block text-sm font-medium text-slate-300 mb-1">Preferred Date</label>
                    <input type="date" id="collection_date" name="collection_date" required
                        class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="slot" class="block text-sm font-medium text-slate-300 mb-1">Time Slot</label>
                    <select id="slot" name="slot" required
                        class="w-full rounded-lg bg-slate-900 border border-slate-700 px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="06:00 AM - 08:00 AM">06:00 AM - 08:00 AM</option>
                        <option value="08:00 AM - 10:00 AM">08:00 AM - 10:00 AM</option>
                        <option value="10:00 AM - 12:00 PM">10:00 AM - 12:00 PM</option>
                        <option value="04:00 PM - 06:00 PM">04:00 PM - 06:00 PM</option>
                    </select>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full py-3.5 px-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg rounded-xl shadow-lg transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-emerald-400">
                Confirm Home Collection Booking
            </button>
        </form>

        <!-- API Result Container -->
        <div id="api-note" class="mt-6 hidden"></div>

    </div>

    <!-- Client-Side JavaScript -->
    <script>
        // Set default collection date to tomorrow
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('collection_date');
            if (!dateInput.value) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateInput.value = tomorrow.toISOString().split('T')[0];
            }
        });

        // Pincode Verification Request
        async function verifyPincode() {
            const pincode = document.getElementById('pincode').value.trim();
            const msgEl = document.getElementById('pincode-msg');
            const labWrapper = document.getElementById('lab-wrapper');
            const labSelect = document.getElementById('lab_id');
            
            msgEl.classList.remove('hidden');

            if (!pincode || pincode.length !== 6 || isNaN(pincode)) {
                msgEl.textContent = "Please enter a valid 6-digit pincode.";
                msgEl.className = "text-red-400 text-sm mt-2 font-medium";
                labWrapper.classList.add('hidden');
                return;
            }

            msgEl.textContent = "Checking serviceability...";
            msgEl.className = "text-blue-400 text-sm mt-2 font-medium animate-pulse";

            try {
                const res = await fetch(`/api/check-serviceability?pincode=${pincode}`);
                const data = await res.json();

                if (data.status === true) {
                    const labs = data.labs || [];
                    msgEl.textContent = `✓ ${data.message} (${labs.length} lab partner(s) available)`;
                    msgEl.className = "text-emerald-400 text-sm mt-2 font-medium";

                    // Populate Lab Dropdown with returned labs
                    if (labs.length > 0) {
                        labSelect.innerHTML = labs.map((lab, index) => {
                            const labId = lab.id || lab.lab_id || lab.code || `LAB_${index + 1}`;
                            const labName = lab.name || lab.lab_name || `Lab Partner #${index + 1} (${labId})`;
                            return `<option value="${labId}">${labName}</option>`;
                        }).join('');
                        labWrapper.classList.remove('hidden');
                    } else {
                        labSelect.innerHTML = `<option value="auto">Auto-Assign Best Available Partner</option>`;
                        labWrapper.classList.remove('hidden');
                    }
                } else {
                    msgEl.textContent = `✕ ${data.message || "Pincode is not serviceable."}`;
                    msgEl.className = "text-red-400 text-sm mt-2 font-medium";
                    labWrapper.classList.add('hidden');
                }
            } catch (err) {
                console.error("Verification error:", err);
                msgEl.textContent = "✕ Error connecting to serviceability server.";
                msgEl.className = "text-red-400 text-sm mt-2 font-medium";
                labWrapper.classList.add('hidden');
            }
        }

        // Form Submission Request
        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const noteEl = document.getElementById('api-note');

            noteEl.classList.remove('hidden');
            noteEl.innerHTML = `
                <div class="p-4 bg-slate-900/80 border border-blue-500/50 rounded-xl text-blue-300 flex items-center justify-center gap-3">
                    <svg class="animate-spin h-5 w-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Scheduling sample collection...</span>
                </div>
            `;

            try {
                const res = await fetch('/api/create-order', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.status === true) {
                    noteEl.innerHTML = `
                        <div class="p-5 bg-emerald-950/60 border border-emerald-500/60 rounded-xl text-emerald-200 shadow-lg">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-2xl">🎉</span>
                                <h4 class="font-bold text-lg text-emerald-300">Booking Confirmed!</h4>
                            </div>
                            <p class="text-sm text-emerald-100 mb-1">Order ID: <strong class="font-mono text-white bg-emerald-900/80 px-2 py-0.5 rounded border border-emerald-700/50">${data.order_id}</strong></p>
                            <p class="text-sm text-emerald-200/90">${data.message}</p>
                        </div>
                    `;
                } else {
                    noteEl.innerHTML = `
                        <div class="p-5 bg-rose-950/60 border border-rose-500/60 rounded-xl text-rose-200 shadow-lg">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="text-xl">⚠️</span>
                                <h4 class="font-bold text-rose-300">LabStack API Validation Note</h4>
                            </div>
                            <p class="text-sm text-rose-200">${data.message || 'Unable to complete order creation.'}</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error("Booking submission error:", err);
                noteEl.innerHTML = `
                    <div class="p-5 bg-rose-950/60 border border-rose-500/60 rounded-xl text-rose-200 shadow-lg">
                        <h4 class="font-bold text-rose-300">Submission Failed</h4>
                        <p class="text-sm mt-1">Unable to communicate with the application server.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
